<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ระบบรันคิว</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh;padding:2rem 1rem}
.wrap{max-width:760px;margin:0 auto}
h1{font-size:20px;font-weight:600;color:#f1f5f9;margin-bottom:1.5rem}

/* add row */
.add-row{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.add-row input{flex:1;min-width:140px;height:38px;padding:0 12px;border:1px solid #2d3748;border-radius:8px;font-size:14px;background:#1a1f2e;color:#e2e8f0;outline:none}
.add-row input:focus{border-color:#3b82f6}
.add-row input::placeholder{color:#475569}
.add-row select{height:38px;padding:0 10px;border:1px solid #2d3748;border-radius:8px;font-size:13px;background:#1a1f2e;color:#e2e8f0}
.abtn{height:38px;padding:0 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:#3b82f6;color:#fff}
.abtn:hover{background:#2563eb}

/* stats */
.stats{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}
.stat{background:#1a1f2e;border:1px solid #2d3748;border-radius:8px;padding:6px 14px;font-size:12px;color:#64748b}
.stat b{color:#cbd5e1;font-weight:600}

/* table */
.tbl-wrap{border:1px solid #2d3748;border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#151820;color:#475569;font-weight:600;font-size:11px;padding:10px 14px;text-align:left;border-bottom:1px solid #2d3748;text-transform:uppercase;letter-spacing:.5px}
td{padding:10px 14px;border-bottom:1px solid #1e2433;color:#cbd5e1;vertical-align:middle}
tr:last-child td{border-bottom:none}

/* row highlight - ใช้ class เดียวต่อ row ไม่ overlap */
tr.row-active td{background:#0f2040}
tr.row-done td{opacity:.35}
tr.row-skip td{background:#251800}
tr.row-away td{background:#1e0f2a}

/* badges */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;line-height:1.4}
.badge-wait{background:#1e2433;color:#64748b;border:1px solid #2d3748}
.badge-active{background:#1e3a5f;color:#60a5fa}
.badge-done{background:#14311a;color:#4ade80}
.badge-skip{background:#2d1f00;color:#fbbf24}
.badge-away{background:#2d1030;color:#c084fc;border:1px solid #6b21a8}

/* role */
.role-op{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;background:#2d1f4e;color:#a78bfa}
.role-user{font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px;background:#1e2433;color:#64748b;border:1px solid #2d3748}

/* actions */
.acts{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.move-col{display:flex;flex-direction:column;gap:2px;margin-right:2px}

/* move buttons — ใช้ text แทน SVG ทั้งหมด */
.mbtn{width:24px;height:20px;padding:0;border:1px solid #2d3748;border-radius:5px;background:#1a1f2e;color:#94a3b8;cursor:pointer;font-size:10px;line-height:1;display:flex;align-items:center;justify-content:center}
.mbtn:hover{background:#252d3d}
.mbtn:disabled{opacity:.2;cursor:default;pointer-events:none}

.sep{width:1px;height:20px;background:#2d3748;margin:0 3px;flex-shrink:0}

/* action buttons */
.xbtn{height:27px;padding:0 10px;font-size:11px;font-weight:600;border-radius:7px;cursor:pointer;white-space:nowrap;border:1px solid #2d3748;background:#1a1f2e;color:#cbd5e1}
.xbtn:hover{background:#252d3d}
.xbtn-check{background:#14311a;color:#4ade80;border-color:#166534}
.xbtn-check:hover{background:#166534}
.xbtn-skip{background:#2d1f00;color:#fbbf24;border-color:#78350f}
.xbtn-skip:hover{background:#78350f}
.xbtn-away{background:#2d1030;color:#c084fc;border-color:#6b21a8}
.xbtn-away:hover{background:#3b0764}
.xbtn-back{background:#1e2433;color:#94a3b8;border-color:#3d4f6b}
.xbtn-back:hover{background:#252d3d}
.xbtn-del{color:#f87171;border-color:#450a0a;background:#1a1f2e}
.xbtn-del:hover{background:#1f0a0a}

.num{font-weight:600;color:#374151;font-size:12px}
.name-txt{font-weight:500;color:#e2e8f0}
.op-note{font-size:10px;color:#374151;margin-left:5px}

.bot{display:flex;justify-content:flex-end;margin-top:.85rem}
.rbtn{height:30px;padding:0 14px;font-size:12px;border:1px solid #2d3748;border-radius:8px;background:#1a1f2e;color:#64748b;cursor:pointer}
.rbtn:hover{background:#252d3d;color:#94a3b8}

.empty{text-align:center;padding:2.5rem;color:#374151;font-size:13px}
.toast{position:fixed;bottom:1.75rem;left:50%;transform:translateX(-50%);background:#14311a;color:#4ade80;border:1px solid #166534;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
.round-badge{display:inline-block;margin-left:8px;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;background:#1e3a5f;color:#60a5fa;vertical-align:middle}

@media(max-width:540px){
  body{padding:1rem .5rem}
  th:nth-child(3),td:nth-child(3){display:none}
}
</style>
</head>
<body>
<div class="wrap">
  <h1>ระบบรันคิว <span id="roundLabel"></span></h1>
  <div class="add-row">
    <input type="text" id="ni" placeholder="ชื่อผู้เข้าคิว..." maxlength="30"/>
    <select id="rs">
      <option value="user">ทั่วไป</option>
      <option value="operator">Operator</option>
    </select>
    <button class="abtn" onclick="add()">+ เพิ่มคิว</button>
  </div>
  <div class="stats" id="stats"></div>
  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:36px">#</th>
          <th>ชื่อ</th>
          <th style="width:95px">ตำแหน่ง</th>
          <th style="width:130px">สถานะ</th>
          <th>จัดการ</th>
        </tr>
      </thead>
      <tbody id="qb"></tbody>
    </table>
    <div class="empty" id="em" style="display:none">ยังไม่มีคิว</div>
  </div>
  <div class="bot">
    <button class="rbtn" onclick="hardReset()">รีเซ็ตและล้างรายชื่อ</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
var q = [
  {id:1,name:'สมชาย', role:'user',    st:'waiting'},
  {id:2,name:'สมหญิง',role:'operator',st:'waiting'},
  {id:3,name:'วิชัย', role:'user',    st:'waiting'},
  {id:4,name:'นภา',   role:'user',    st:'waiting'}
];
var nid=5, round=1;

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2800);
}
function isOut(st){return st==='done'||st==='skip'||st==='away';}
function allFinished(){
  if(!q.length) return false;
  for(var i=0;i<q.length;i++) if(!isOut(q[i].st)) return false;
  return true;
}
function softReset(){
  round++;
  for(var i=0;i<q.length;i++) if(q[i].st!=='away') q[i].st='waiting';
  ensureActive();
  showToast('รอบที่ '+round+' เริ่มแล้ว');
  render();
}
function hardReset(){q=[];nid=1;round=1;render();}
function actIdx(){for(var i=0;i<q.length;i++) if(q[i].st==='active') return i; return -1;}
function ensureActive(){
  if(actIdx()===-1)
    for(var i=0;i<q.length;i++) if(q[i].st==='waiting'){q[i].st='active';break;}
}
function nextWaiting(){
  var c=actIdx(),s=c===-1?0:c+1;
  for(var i=s;i<q.length;i++) if(q[i].st==='waiting') return i;
  return -1;
}
function byId(id){for(var i=0;i<q.length;i++) if(q[i].id===id) return q[i]; return null;}
function idxOf(id){for(var i=0;i<q.length;i++) if(q[i].id===id) return i; return -1;}

function add(){
  var inp=document.getElementById('ni'),role=document.getElementById('rs').value,name=inp.value.trim();
  if(!name){inp.focus();return;}
  q.push({id:nid++,name:name,role:role,st:'waiting'});
  inp.value=''; ensureActive(); render();
}
function checkDone(id){
  var p=byId(id); if(!p) return;
  p.st='done';
  var n=nextWaiting(); if(n!==-1) q[n].st='active';
  if(allFinished()) setTimeout(softReset,600); else render();
}
function doSkip(id){
  var p=byId(id); if(!p) return;
  var wasA=p.st==='active'; p.st='skip';
  if(wasA){var n=nextWaiting();if(n!==-1) q[n].st='active';}
  if(allFinished()) setTimeout(softReset,600); else render();
}
function doAway(id){
  var p=byId(id); if(!p) return;
  var wasA=p.st==='active'; p.st='away';
  if(wasA){var n=nextWaiting();if(n!==-1) q[n].st='active';}
  if(allFinished()) setTimeout(softReset,600); else render();
}
function doBack(id){
  var p=byId(id); if(!p) return;
  p.st='waiting'; ensureActive(); render();
}
function doDelete(id){
  var i=idxOf(id); if(i===-1) return;
  var wasA=q[i].st==='active'; q.splice(i,1);
  if(wasA) for(var j=0;j<q.length;j++) if(q[j].st==='waiting'){q[j].st='active';break;}
  render();
}
function moveUp(id){
  var i=idxOf(id); if(i<=0) return;
  var t=q[i-1];q[i-1]=q[i];q[i]=t; ensureActive(); render();
}
function moveDown(id){
  var i=idxOf(id); if(i===-1||i>=q.length-1) return;
  var t=q[i+1];q[i+1]=q[i];q[i]=t; ensureActive(); render();
}

function badge(st){
  if(st==='waiting') return '<span class="badge badge-wait">รอ</span>';
  if(st==='active')  return '<span class="badge badge-active">กำลังดำเนิน</span>';
  if(st==='done')    return '<span class="badge badge-done">เสร็จแล้ว</span>';
  if(st==='skip')    return '<span class="badge badge-skip">ไม่ว่าง/ข้าม</span>';
  if(st==='away')    return '<span class="badge badge-away">ไม่ว่างยาว</span>';
  return '';
}

function render(){
  ensureActive();
  var tb=document.getElementById('qb'),em=document.getElementById('em');
  document.getElementById('roundLabel').innerHTML=round>1?'<span class="round-badge">รอบที่ '+round+'</span>':'';
  if(!q.length){tb.innerHTML='';em.style.display='block';return;}
  em.style.display='none';
  var rows='',n=0;
  for(var i=0;i<q.length;i++){
    var p=q[i];
    if(p.st==='waiting'||p.st==='active') n++;
    var rc=p.st==='active'?'row-active':p.st==='done'?'row-done':p.st==='skip'?'row-skip':p.st==='away'?'row-away':'';
    var rb=p.role==='operator'?'<span class="role-op">Operator</span>':'<span class="role-user">ทั่วไป</span>';
    var opNote=p.role==='operator'?'<span class="op-note">(ข้าม)</span>':'';
    var canMove=p.st==='waiting'||p.st==='active';
    var upDis=(!canMove||i===0)?' disabled':'';
    var dnDis=(!canMove||i===q.length-1)?' disabled':'';
    var arrows='<div class="move-col">'
      +'<button class="mbtn"'+upDis+' onclick="moveUp('+p.id+')">^</button>'
      +'<button class="mbtn"'+dnDis+' onclick="moveDown('+p.id+')">v</button>'
      +'</div>';
    var btns='';
    if(p.st==='active'){
      btns+='<button class="xbtn xbtn-check" onclick="checkDone('+p.id+')">เช็ค</button>';
      btns+='<button class="xbtn xbtn-skip" onclick="doSkip('+p.id+')">ไม่ว่าง</button>';
      btns+='<button class="xbtn xbtn-away" onclick="doAway('+p.id+')">ไม่ว่างยาว</button>';
    } else if(p.st==='waiting'){
      btns+='<button class="xbtn xbtn-skip" onclick="doSkip('+p.id+')">ไม่ว่าง</button>';
      btns+='<button class="xbtn xbtn-away" onclick="doAway('+p.id+')">ไม่ว่างยาว</button>';
    } else if(p.st==='skip'){
      btns+='<button class="xbtn xbtn-check" onclick="checkDone('+p.id+')">เสร็จแล้ว</button>';
      btns+='<button class="xbtn xbtn-away" onclick="doAway('+p.id+')">ไม่ว่างยาว</button>';
    } else if(p.st==='away'){
      btns+='<button class="xbtn xbtn-back" onclick="doBack('+p.id+')">กลับเข้าคิว</button>';
    }
    btns+='<button class="xbtn xbtn-del" onclick="doDelete('+p.id+')">ลบ</button>';
    var numD=isOut(p.st)?'&mdash;':n;
    rows+='<tr class="'+rc+'">'
      +'<td class="num">'+numD+'</td>'
      +'<td><span class="name-txt">'+p.name+'</span>'+opNote+'</td>'
      +'<td>'+rb+'</td>'
      +'<td>'+badge(p.st)+'</td>'
      +'<td><div class="acts">'+arrows+'<div class="sep"></div>'+btns+'</div></td>'
      +'</tr>';
  }
  tb.innerHTML=rows;
  var cW=0,cD=0,cS=0,cA=0;
  for(var i=0;i<q.length;i++){
    var s=q[i].st;
    if(s==='waiting')cW++; else if(s==='done')cD++; else if(s==='skip')cS++; else if(s==='away')cA++;
  }
  document.getElementById('stats').innerHTML=
    '<div class="stat">รอ: <b>'+cW+'</b></div>'+
    '<div class="stat">เสร็จ: <b>'+cD+'</b></div>'+
    '<div class="stat">ข้าม: <b>'+cS+'</b></div>'+
    '<div class="stat">ไม่ว่างยาว: <b>'+cA+'</b></div>'+
    '<div class="stat">ทั้งหมด: <b>'+q.length+'</b></div>';
}

document.getElementById('ni').addEventListener('keydown',function(e){if(e.key==='Enter')add();});
render();
</script>
</body>
</html>
